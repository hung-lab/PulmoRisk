name: Release
on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  issues: write
  repository-projects: read

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          release-type: simple
          target-branch: main

  build-linux:
    needs: release
    if: needs.release.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: uv sync --dev

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            imagemagick \
            fuse \
            libfuse2 \
            wget

      - name: Generate version.py
        env:
          VERSION: ${{ needs.release.outputs.tag_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          DATE=$(date +%F)

          cat > src/app/config/version.py << EOF
          VERSION = "${VERSION#v}"
          BUILD_DATE = "${DATE}"
          GITHUB = "https://github.com/${REPOSITORY}"
          EOF

      - name: Run Linux build script
        env:
          VERSION: ${{ needs.release.outputs.tag_name }}
        run: |
          VERSION="${VERSION#v}" ./scripts/build_linux.sh both

      - name: Upload to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.release.outputs.tag_name }}"
          VERSION="${VERSION#v}"

          gh release upload ${{ needs.release.outputs.tag_name }} \
            dist/PulmoRisk-${VERSION}-x86_64.AppImage \
            dist/pulmorisk_${VERSION}_amd64.deb

  build-windows:
    needs: release
    if: needs.release.outputs.release_created == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: uv sync --dev

      - name: Install ImageMagick
        run: choco install imagemagick -y

      - name: Generate .ico
        run: |
          magick src/app/assets/icons/app_icon.png -define icon:auto-resize=256,128,64,48,32,16 src/app/assets/icons/app_icon.ico

      - name: Generate version.py
        shell: pwsh
        env:
          TAG_NAME: ${{ needs.release.outputs.tag_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          $VERSION = $env:TAG_NAME -replace '^v', ''
          $DATE    = Get-Date -Format "yyyy-MM-dd"
          $GITHUB  = "https://github.com/$env:REPOSITORY"
          $content = "VERSION = `"$VERSION`"`nBUILD_DATE = `"$DATE`"`nGITHUB_URL = `"$GITHUB`""
          Set-Content src/app/config/version.py $content

      - name: Build with PyInstaller
        run: uv run pyinstaller --clean --noconfirm pulmorisk-windows.spec

      - name: Zip output
        shell: pwsh
        env:
          TAG_NAME: ${{ needs.release.outputs.tag_name }}
        run: |
          $VERSION = $env:TAG_NAME -replace '^v',''
          Compress-Archive -Path dist/pulmorisk -DestinationPath dist/pulmorisk-windows-x86_64-$VERSION.zip

      - name: Upload to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.release.outputs.tag_name }}
        run: |
          $VERSION = $env:TAG_NAME -replace '^v',''
          gh release upload ${{ needs.release.outputs.tag_name }} dist/pulmorisk-windows-x86_64-$VERSION.zip

  build-mac:
    needs: release
    if: needs.release.outputs.release_created == 'true'
    strategy:
      matrix:
        include:
          - runner: macos-latest # ARM (M1/M2)
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: uv sync --dev

      - name: Generate .icns
        run: |
          mkdir app_icon.iconset
          sips -z 16 16     src/app/assets/icons/app_icon.png --out app_icon.iconset/icon_16x16.png
          sips -z 32 32     src/app/assets/icons/app_icon.png --out app_icon.iconset/icon_16x16@2x.png
          sips -z 32 32     src/app/assets/icons/app_icon.png --out app_icon.iconset/icon_32x32.png
          sips -z 64 64     src/app/assets/icons/app_icon.png --out app_icon.iconset/icon_32x32@2x.png
          sips -z 128 128   src/app/assets/icons/app_icon.png --out app_icon.iconset/icon_128x128.png
          sips -z 256 256   src/app/assets/icons/app_icon.png --out app_icon.iconset/icon_128x128@2x.png
          sips -z 256 256   src/app/assets/icons/app_icon.png --out app_icon.iconset/icon_256x256.png
          sips -z 512 512   src/app/assets/icons/app_icon.png --out app_icon.iconset/icon_256x256@2x.png
          sips -z 512 512   src/app/assets/icons/app_icon.png --out app_icon.iconset/icon_512x512.png
          sips -z 1024 1024 src/app/assets/icons/app_icon.png --out app_icon.iconset/icon_512x512@2x.png
          iconutil -c icns app_icon.iconset -o src/app/assets/icons/app_icon.icns
          rm -rf app_icon.iconset

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Generate version.py
        env:
          TAG_NAME: ${{ needs.release.outputs.tag_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          DATE=$(date +%F)
          VERSION="${TAG_NAME#v}"

          printf 'VERSION = "%s"\nBUILD_DATE = "%s"\nGITHUB_URL = "https://github.com/%s"\n' \
              "$VERSION" "$DATE" "$REPOSITORY" > src/app/config/version.py

      - name: Build with PyInstaller
        env:
          VERSION: ${{ needs.release.outputs.tag_name }}
        run: |
          export VERSION="${VERSION#v}"   # strip the "v" prefix
          uv run pyinstaller --clean --noconfirm pulmorisk-mac.spec

      - name: Create DMG
        env:
          TAG_NAME: ${{ needs.release.outputs.tag_name }}
        run: |
          VERSION="${TAG_NAME#v}"

          # pulmorisk-mac.spec produces dist/PulmoRisk.app (the BUNDLE target)
          create-dmg \
            --volname "PulmoRisk" \
            --window-size 600 300 \
            --icon-size 100 \
            --icon "PulmoRisk.app" 120 150 \
            --app-drop-link 450 150 \
            dist/PulmoRisk-mac-${VERSION}-${{ matrix.arch }}.dmg \
            dist/PulmoRisk.app

          if [ ! -f "dist/PulmoRisk-mac-${VERSION}-${{ matrix.arch }}.dmg" ]; then
            cp -r dist/PulmoRisk.app dist/PulmoRisk-mac-${VERSION}-${{ matrix.arch }}.dmg
          fi 

      - name: Upload to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.release.outputs.tag_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          gh release upload ${{ needs.release.outputs.tag_name }} \
            dist/PulmoRisk-mac-${VERSION}-${{ matrix.arch }}.dmg
