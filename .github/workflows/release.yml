name: Release
on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  issues: write
  repository-projects: read

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          release-type: simple
          target-branch: main

  build-linux:
    needs: release
    if: needs.release.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: uv sync --dev

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            imagemagick \
            fuse \
            libfuse2 \
            wget

      - name: Run Linux build script
        run: |
          VERSION="${VERSION#v}" ./scripts/build_linux.sh both

      - name: Upload to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ needs.release.outputs.tag_name }} \
            dist/PulmoRisk-x86_64.AppImage \
            dist/pulmorisk_*_amd64.deb

  build-windows:
    needs: release
    if: needs.release.outputs.release_created == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: uv sync --dev

      - name: Install ImageMagick
        run: choco install imagemagick -y

      - name: Generate .ico
        run: |
          magick src/app/assets/icons/app_icon.png -define icon:auto-resize=256,128,64,48,32,16 src/app/assets/icons/app_icon.ico

      - name: Build with PyInstaller
        run: uv run pyinstaller --clean --noconfirm pulmorisk-windows.spec

      - name: Zip output
        shell: pwsh
        run: |
          Compress-Archive -Path dist/pulmorisk -DestinationPath dist/pulmorisk-windows-x86_64.zip

      - name: Upload to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ needs.release.outputs.tag_name }} dist/pulmorisk-windows-x86_64.zip

  build-mac:
    needs: release
    if: needs.release.outputs.release_created == 'true'
    strategy:
      matrix:
        include:
          - runner: macos-latest # ARM (M1/M2)
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: uv sync --dev

      - name: Generate .icns
        run: |
          mkdir app_icon.iconset
          sips -z 16 16     src/app/assets/icons/app_icon.png --out app_icon.iconset/icon_16x16.png
          sips -z 32 32     src/app/assets/icons/app_icon.png --out app_icon.iconset/icon_16x16@2x.png
          sips -z 32 32     src/app/assets/icons/app_icon.png --out app_icon.iconset/icon_32x32.png
          sips -z 64 64     src/app/assets/icons/app_icon.png --out app_icon.iconset/icon_32x32@2x.png
          sips -z 128 128   src/app/assets/icons/app_icon.png --out app_icon.iconset/icon_128x128.png
          sips -z 256 256   src/app/assets/icons/app_icon.png --out app_icon.iconset/icon_128x128@2x.png
          sips -z 256 256   src/app/assets/icons/app_icon.png --out app_icon.iconset/icon_256x256.png
          sips -z 512 512   src/app/assets/icons/app_icon.png --out app_icon.iconset/icon_256x256@2x.png
          sips -z 512 512   src/app/assets/icons/app_icon.png --out app_icon.iconset/icon_512x512.png
          sips -z 1024 1024 src/app/assets/icons/app_icon.png --out app_icon.iconset/icon_512x512@2x.png
          iconutil -c icns app_icon.iconset -o src/app/assets/icons/app_icon.icns
          rm -rf app_icon.iconset

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build with PyInstaller
        run: uv run pyinstaller --clean --noconfirm pulmorisk-mac.spec

      - name: Create DMG
        run: |
          # pulmorisk-mac.spec produces dist/PulmoRisk.app (the BUNDLE target)
          create-dmg \
            --volname "PulmoRisk" \
            --window-size 400 200 \
            --icon-size 100 \
            --app-drop-link 300 100 \
            dist/PulmoRisk-mac-${{ matrix.arch }}.dmg \
            dist/PulmoRisk.app

          if [ ! -f "dist/PulmoRisk-mac-${{ matrix.arch }}.dmg" ]; then
            cp -r dist/PulmoRisk.app dist/PulmoRisk-mac-${{ matrix.arch }}.dmg
          fi 

      - name: Upload to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ needs.release.outputs.tag_name }} \
            dist/PulmoRisk-mac-${{ matrix.arch }}.dmg
