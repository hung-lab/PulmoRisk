services:
  app:
    build:
      context: .
      # optional: name the image so Docker reuses the layer cache
      cache_from:
        - tkinter-app:latest
    image: tkinter-app:latest
    container_name: tkinter-app-dev
    volumes:
      - .:/app
    environment:
      - DISPLAY=${DISPLAY}
      - XAUTHORITY=${XAUTHORITY}
    network_mode: host
    stdin_open: true
    tty: true

  shell:
    image: tkinter-app:latest
    container_name: tkinter-app-shell
    volumes:
      - .:/app
    environment:
      - DISPLAY=${DISPLAY}
      - XAUTHORITY=${XAUTHORITY}
    network_mode: host
    stdin_open: true
    tty: true
    command: /bin/bash
