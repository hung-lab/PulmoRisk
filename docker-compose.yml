services:
  app:
    build:
      context: .
      # optional: name the image so Docker reuses the layer cache
      cache_from:
        - PulmoRisk:latest
    image: PulmoRisk:latest
    container_name: PulmoRisk-dev
    volumes:
      - .:/app
    environment:
      - DISPLAY=${DISPLAY}
      - XAUTHORITY=${XAUTHORITY}
    network_mode: host
    stdin_open: true
    tty: true

  shell:
    image: PulmoRisk:latest
    container_name: PulmoRisk-shell
    volumes:
      - .:/app
    environment:
      - DISPLAY=${DISPLAY}
      - XAUTHORITY=${XAUTHORITY}
    network_mode: host
    stdin_open: true
    tty: true
    command: /bin/bash
