services:
  app:
    build: .
    container_name: tkinter-app-dev
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
      - ./scripts:/app/scripts
    environment:
      - DISPLAY=${DISPLAY}
      - XAUTHORITY=${XAUTHORITY}
    network_mode: host
    stdin_open: true
    tty: true

  shell:
    build: .
    container_name: tkinter-app-shell
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
      - ./scripts:/app/scripts
    environment:
      - DISPLAY=${DISPLAY}
      - XAUTHORITY=${XAUTHORITY}
    network_mode: host
    stdin_open: true
    tty: true
    command: /bin/bash
